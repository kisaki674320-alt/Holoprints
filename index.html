<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gpiplay Holoprint</title>

<style>
:root{
--bg:#ffffff;
--card:#f4f4f4;
--text:#111;
--accent:#00bcd4;
}

body.dark{
--bg:#000000;
--card:#0a0a0a;
--text:#ffffff;
}

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:var(--card);
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.right{
display:flex;
gap:10px;
align-items:center;
}

.logo{
height:35px;
}

.skin{
height:35px;
border-radius:6px;
}

.btn{
padding:8px 14px;
border:none;
background:var(--accent);
color:white;
border-radius:6px;
cursor:pointer;
}

.nav{
display:flex;
gap:15px;
padding:10px 20px;
}

.nav button{
background:none;
border:none;
font-size:16px;
cursor:pointer;
color:var(--text);
}

/* SEARCH */

.search{
padding:15px;
display:flex;
gap:10px;
}

.search input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
padding:20px;
}

background
